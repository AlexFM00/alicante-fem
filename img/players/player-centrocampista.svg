<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#1763B6"/>
      <stop offset="100%" stop-color="#0B1F3A"/>
    </linearGradient>
    <linearGradient id="jersey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8edf8"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="240" height="300" fill="url(#bg)"/>
  <ellipse cx="118" cy="294" rx="54" ry="6" fill="rgba(0,0,0,0.3)"/>

  <!-- Brazo derecho hacia adelante (carrera) -->
  <path d="M150,126 Q172,138 178,160" stroke="#E8C49A" stroke-width="15" stroke-linecap="round" fill="none"/>
  <circle cx="178" cy="163" r="9" fill="#E8C49A"/>

  <!-- Brazo izquierdo hacia atrás -->
  <path d="M90,126 Q68,148 62,172" stroke="#E8C49A" stroke-width="15" stroke-linecap="round" fill="none"/>
  <circle cx="62" cy="175" r="9" fill="#E8C49A"/>

  <!-- Jersey cuerpo (ligeramente inclinado hacia adelante) -->
  <path d="M86,118 L158,118 L150,210 L96,210 Z" fill="url(#jersey)"/>
  <path d="M86,118 L103,118 L99,210 L96,210 Z" fill="#1763B6" opacity="0.35"/>
  <path d="M158,118 L141,118 L146,210 L150,210 Z" fill="#1763B6" opacity="0.35"/>
  <path d="M108,118 Q121,128 135,118" stroke="#1763B6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="122" y="183" text-anchor="middle" font-family="'Arial Black',Arial,sans-serif" font-size="36" font-weight="900" fill="#1763B6" opacity="0.45">8</text>

  <!-- Cuello -->
  <rect x="111" y="100" width="20" height="22" rx="6" fill="#E8C49A"/>
  <!-- Cabeza (ligeramente hacia delante) -->
  <ellipse cx="122" cy="76" rx="26" ry="27" fill="#E8C49A"/>
  <!-- Pelo trenza/coleta -->
  <ellipse cx="122" cy="53" rx="26" ry="13" fill="#5C3A1E"/>
  <path d="M142,60 Q158,72 148,96" stroke="#5C3A1E" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Pierna izquierda (adelantada, zancada) -->
  <path d="M96,208 L116,208 L108,268 L84,268 Z" fill="#0B1F3A"/>
  <!-- Pierna derecha (atrasada) -->
  <path d="M150,208 L128,208 L132,255 L154,255 Z" fill="#0B1F3A"/>

  <!-- Medias pierna izquierda -->
  <rect x="82" y="266" width="28" height="20" rx="3" fill="white"/>
  <rect x="82" y="266" width="28" height="6" fill="#1763B6"/>
  <!-- Medias pierna derecha -->
  <rect x="130" y="253" width="26" height="20" rx="3" fill="white"/>
  <rect x="130" y="253" width="26" height="6" fill="#1763B6"/>

  <!-- Bota izquierda (adelantada) -->
  <path d="M80,284 Q68,286 66,294 L110,294 L110,284 Z" fill="#0a1830"/>
  <!-- Bota derecha (atrasada) -->
  <path d="M152,271 Q164,273 166,281 L128,281 L128,271 Z" fill="#0a1830"/>

  <text x="120" y="299" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.38)" letter-spacing="2">CENTROCAMPISTA</text>
</svg>
